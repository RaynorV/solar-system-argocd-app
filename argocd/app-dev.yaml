apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solar-system-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: harbor.local:8443/library
    chart: solar-system
    targetRevision: 0.1.1
    helm:
      valuesObject:
        replicaCount: 1
        ingress:
          host: solar-system-dev.local
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true